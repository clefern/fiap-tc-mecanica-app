sonar.projectKey=mecanicaapp
sonar.projectName=Mecanica API
sonar.projectVersion=1.0

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusões de cobertura (gerados, configs, DTOs sem lógica)
sonar.coverage.exclusions=\
  **/dto/**,\
  **/entity/**,\
  **/config/**,\
  **/seeding/**,\
  **/exception/**,\
  **/*Application.java,\
  **/mapper/**

# Exclusões de análise (não analisar código gerado)
sonar.exclusions=\
  **/entity/**,\
  **/*Application.java
