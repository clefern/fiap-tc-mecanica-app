receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 100ms

exporters:
  debug:
    verbosity: detailed
  otlp/newrelic:
    endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    headers:
      api-key: ${NEW_RELIC_LICENSE_KEY}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/newrelic, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/newrelic, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/newrelic, debug]
