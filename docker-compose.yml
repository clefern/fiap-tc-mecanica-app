  sonarqube:
    image: sonarqube:community
    profiles: ['audit']
    depends_on:
      - db
    networks:
      - sonar_net
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - '9000:9000'
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_logs:/opt/sonarqube/logs

  db:
    image: postgres:13
    profiles: ['audit']
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    networks:
      - sonar_net
    volumes:
      - sonar_db:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sonar -d sonar']
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: mecanica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mecanica_user
      POSTGRES_PASSWORD: mecanica_pass
      POSTGRES_DB: mecanica
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mecanica_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mecanica_user -d mecanica']
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  adminer:
    image: adminer
    container_name: mecanica-adminer
    restart: always
    ports:
      - '8081:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - mecanica_net

  mailhog:
    image: mailhog/mailhog:latest
    platform: linux/amd64
    container_name: mecanica-mailhog
    restart: always
    ports:
      - '1025:1025' # SMTP server
      - '8025:8025' # Web UI
    networks:
      - mecanica_net
networks:
  mecanica_net:
    driver: bridge
  sonar_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  sonar_data:
  sonar_logs:
  sonar_db:
