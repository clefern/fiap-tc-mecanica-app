  postgres:
    image: postgres:16-alpine
    container_name: mecanica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mecanica_user
      POSTGRES_PASSWORD: mecanica_pass
      POSTGRES_DB: mecanica
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mecanica_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mecanica_user -d mecanica']
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  adminer:
    image: adminer
    container_name: mecanica-adminer
    restart: always
    ports:
      - '8081:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - mecanica_net

  mailhog:
    image: mailhog/mailhog:latest
    platform: linux/amd64
    container_name: mecanica-mailhog
    restart: always
    ports:
      - '1025:1025' # SMTP server
      - '8025:8025' # Web UI
    networks:
      - mecanica_net

  otel-collector:
    image: otel/opentelemetry-collector-contrib
    container_name: mecanica-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    env_file:
      - .env
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
    networks:
      - mecanica_net
