######################################################
# CI — Testes automáticos
# Dispara automaticamente em push e pull request.
# Para infra, build e deploy, use os workflows manuais em `.github/workflows/`:
#   deploy.yml — build ECR + rollout no EKS
#   build-push.yml — só imagem (reutilizável)
######################################################
name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'feat/**'
  pull_request:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'feat/**'

permissions:
  contents: read

jobs:
  test:
    name: 🧪 Testes
    uses: ./.github/workflows/test.yml
    with:
      java-version: ${{ vars.JAVA_VERSION }}
