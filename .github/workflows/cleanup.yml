name: Cleanup Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to cleanup'
        type: choice
        options: [ develop, lab ]
        default: lab

permissions:
  contents: read
  id-token: write

jobs:
  cleanup:
    name: 🧹 Cleanup ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Criar profile AWS temporário para Terraform
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials << EOC
          [${{ vars.TF_PROFILE }}]
          aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token = ${{ secrets.AWS_SESSION_TOKEN }}
          EOC
          
          cat > ~/.aws/config << EOC
          [profile ${{ vars.TF_PROFILE }}]
          region = ${{ vars.AWS_REGION }}
          EOC

      - name: Destruir infraestrutura Terraform
        timeout-minutes: 20
        run: |
          set -e
          echo "Destruindo infraestrutura Terraform..."
          cd infra/environments/${{ github.event.inputs.environment }}

          echo "Inicializando Terraform..."
          terraform init -input=false \
            -backend-config="bucket=${{ vars.AWS_TF_BUCKET_NAME }}" \
            -backend-config="profile=${{ vars.TF_PROFILE }}"

          terraform refresh
          
          terraform destroy -auto-approve

      - name: Remover bucket S3 do estado e tabela DynamoDB
        timeout-minutes: 10
        working-directory: ${{ github.workspace }}
        run: |
          BUCKET_NAME=${{ vars.AWS_TF_BUCKET_NAME }}
          REGION=${{ vars.AWS_REGION }}
          PROFILE=${{ vars.TF_PROFILE }}
          chmod +x ./scripts/cleanup_tf_lab.sh
          ./scripts/cleanup_tf_lab.sh "$BUCKET_NAME" "$REGION" "$PROFILE"

      - name: Resumo do cleanup
        run: |
          echo "✅ Cleanup completo do ambiente ${{ github.event.inputs.environment }} finalizado!"
          echo ""
          echo "📋 Resumo das operações:"
          echo "  - Infraestrutura Terraform destruída (EKS, VPC, ECR, etc)"
          echo "  - Bucket S3 do estado removido"
          echo "  - Tabela DynamoDB de lock removida"
          echo ""
          echo "🚀 Ambiente ${{ github.event.inputs.environment }} está pronto para ser recriado do zero!"
