name: Reusable — Testes

on:
  workflow_call:
    inputs:
      java-version:
        required: false
        type: string
        default: '21'

jobs:
  test:
    name: 🧪 Testes Maven
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Executar testes com Maven
        run: ./mvnw clean test --batch-mode --no-transfer-progress

      - name: Publicar relatório Surefire
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Publicar relatório JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7

      - name: 📊 Resumo de Cobertura
        if: always()
        run: |
          if [ -f target/site/jacoco/index.html ]; then
            echo "### 📊 Relatório de Cobertura" >> $GITHUB_STEP_SUMMARY
            echo "O relatório de cobertura do JaCoCo foi gerado e está disponível nos artefatos." >> $GITHUB_STEP_SUMMARY
          fi
