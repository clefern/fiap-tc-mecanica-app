######################################################
# CD — Execução manual
# Dispare pela aba: Actions → "Provision & Deploy" → Run workflow
# Ao executar, todos os passos rodam em sequência:
#   Infra (Terraform) → Build & Push (ECR) → Deploy (EKS)
######################################################
name: CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente'
        required: true
        type: choice
        options:
          - "lab"
          - "develop"
        default: "lab"
      aws_region:
        description: 'Região AWS para o deployment'
        required: true
        type: string
        default: "us-east-1"
      aws_account_id:
        description: 'Account ID AWS (opcional, necessário para cross-account)'
        required: false
        type: string
      ecr_repository:
        description: 'ECR Repository'
        required: true
        type: string
        default: "fiap-mecanica"
      eks_cluster_name:
        description: 'EKS Cluster Name'
        required: true
        type: string
        default: "fiap-cluster"

permissions:
  contents: write

jobs:

  ##################
  ## Build & Push ##
  ##################
  build:
    name: 🐳 Build & Push - ${{ inputs.environment }}
    uses: ./.github/workflows/build.yml
    with:
      aws_region: ${{ inputs.aws_region }}
      ecr_repository: ${{ inputs.ecr_repository }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

  ############
  ## Deploy ##
  ############
  deploy:
    name: 🚀 Deploy
    needs: [ build ]
    uses: ./.github/workflows/deploy.yml
    with:
      environment: ${{ inputs.environment }}
      aws_region: ${{ inputs.aws_region }}
      aws_account_id: ${{ inputs.aws_account_id || vars.AWS_ACCOUNT_ID }}
      eks_cluster_name: ${{ inputs.eks_cluster_name }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
