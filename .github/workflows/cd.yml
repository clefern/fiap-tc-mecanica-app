######################################################
# CD — App only (build ECR + rollout)
#
# Deploy completo dos 4 repos: use fiap-tc-mecanica-infra-k8s
#   Actions → "Provision & Deploy"
######################################################
name: CD — App only

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente'
        required: true
        type: choice
        options:
          - lab
          - develop
          - prod
        default: lab
      aws_region:
        description: 'Região AWS'
        required: true
        type: string
        default: us-east-1
      ecr_repository:
        description: 'Repositório ECR'
        required: true
        type: string
        default: fiap-mecanica
      eks_cluster_name:
        description: 'Nome do cluster EKS'
        required: true
        type: string
        default: lab-fiap-cluster
      bump_version:
        description: 'Incrementar patch SemVer'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  deploy:
    name: 🐳 Deploy App
    uses: ./.github/workflows/deploy.yml
    with:
      environment: ${{ inputs.environment }}
      aws_region: ${{ inputs.aws_region }}
      ecr_repository: ${{ inputs.ecr_repository }}
      eks_cluster_name: ${{ inputs.eks_cluster_name }}
      bump_version: ${{ inputs.bump_version }}
      rollout_only: false
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
