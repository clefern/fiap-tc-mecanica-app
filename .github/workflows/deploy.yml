######################################################
# Deploy App — build/push ECR + rollout no EKS
# Ordem sugerida: infra-k8s "Provision & Deploy" ou após k8s deploy
######################################################
name: Deploy App

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      aws_region:
        required: true
        type: string
      ecr_repository:
        required: true
        type: string
      eks_cluster_name:
        required: true
        type: string
      bump_version:
        required: false
        type: boolean
        default: false
      rollout_only:
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_SESSION_TOKEN:
        required: true
      GITHUB_TOKEN:
        required: true

  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente / overlay K8s'
        required: true
        type: choice
        options:
          - lab
          - develop
          - prod
        default: lab
      aws_region:
        description: 'Região AWS'
        required: true
        type: string
        default: us-east-1
      ecr_repository:
        description: 'Repositório ECR'
        required: true
        type: string
        default: fiap-mecanica
      eks_cluster_name:
        description: 'Nome do cluster EKS'
        required: true
        type: string
        default: lab-fiap-cluster
      bump_version:
        description: 'Incrementar patch SemVer e criar tag git'
        required: true
        type: boolean
        default: false
      rollout_only:
        description: 'Pular build — apenas restart do Deployment (:latest)'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: 🐳 Build & Push
    if: ${{ !inputs.rollout_only }}
    uses: ./.github/workflows/build-push.yml
    with:
      java-version: ${{ vars.JAVA_VERSION || '21' }}
      aws-region: ${{ inputs.aws_region }}
      ecr-repository: ${{ inputs.ecr_repository }}
      bump-version: ${{ inputs.bump_version }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rollout:
    name: 🚀 Rollout EKS
    needs: [build]
    if: ${{ always() && (inputs.rollout_only || needs.build.result == 'success') }}
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      K8S_NAMESPACE: mecanica
      EKS_CLUSTER: ${{ inputs.eks_cluster_name }}

    steps:
      - name: 🔐 AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ inputs.aws_region }}

      - name: 🔎 Resolve deployment name
        id: target
        run: |
          case "${{ inputs.environment }}" in
            lab)     echo "deployment=lab-mecanica-app" >> "$GITHUB_OUTPUT" ;;
            develop) echo "deployment=develop-mecanica-app" >> "$GITHUB_OUTPUT" ;;
            prod)    echo "deployment=mecanica-app" >> "$GITHUB_OUTPUT" ;;
            *)       echo "deployment=${{ inputs.environment }}-mecanica-app" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: 🔧 Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${EKS_CLUSTER}"

      - name: 🔄 Rollout restart
        run: |
          DEPLOY="${{ steps.target.outputs.deployment }}"
          kubectl rollout restart "deployment/${DEPLOY}" -n "${K8S_NAMESPACE}"
          kubectl rollout status "deployment/${DEPLOY}" -n "${K8S_NAMESPACE}" --timeout=900s

      - name: 📋 Summary
        if: success()
        run: |
          if [[ "${{ inputs.rollout_only }}" != "true" ]]; then
            echo "Image: ${{ needs.build.outputs.image-uri || 'n/a' }}"
          fi
          echo "Deployment: ${{ steps.target.outputs.deployment }}"
